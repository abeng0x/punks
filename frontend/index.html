<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>E A R N Genesis</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>

<style>

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(
circle at top,
#111827,
#030303 70%
);
color:white;
font-family:Arial;
padding:30px;
}

.card{
width:430px;
background:
rgba(255,255,255,0.05);
border:
1px solid rgba(255,255,255,0.08);
border-radius:28px;
padding:28px;
backdrop-filter:blur(14px);
box-shadow:
0 0 50px rgba(0,255,170,0.08);
}

.hero{
width:100%;
border-radius:22px;
margin-bottom:20px;
}

button{
width:100%;
padding:16px;
margin-top:14px;
border:none;
border-radius:16px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

.primary{
background:
linear-gradient(
135deg,
#00ffa3,
#00c2ff
);
color:black;
}

.secondary{
background:#1f2937;
color:white;
}

.stats{
background:
rgba(255,255,255,0.04);
border-radius:18px;
padding:18px;
margin-top:18px;
}

.progress-container{
width:100%;
height:14px;
background:#1f2937;
border-radius:999px;
overflow:hidden;
margin-top:10px;
}

.progress-bar{
width:0%;
height:100%;
background:
linear-gradient(
90deg,
#00ffa3,
#00c2ff
);
transition:0.4s;
}

#address{
color:#00ffa3;
margin-top:12px;
font-size:14px;
word-break:break-all;
}

#networkStatus{
margin-top:12px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<img
class="hero"
src="https://i.imgur.com/Eu4epbQ.jpeg"
/>

<h1>E A R N Genesis</h1>

<p>
ARC Testnet NFT Collection
</p>

<div class="stats">

<p>
Mint Price: 0.001 ETH
</p>

<p id="supply">
Supply: Loading...
</p>

<div class="progress-container">

<div
id="progressBar"
class="progress-bar"
></div>

</div>

<p>
Max Per Wallet: 3
</p>

<p id="owned">
Your NFTs: 0
</p>

</div>

<button
id="connect"
class="primary"
>
Connect Wallet
</button>

<p id="address">
Not Connected
</p>

<p id="networkStatus">
Network: Not Connected
</p>

<button
id="mint"
class="primary"
>
Mint NFT
</button>

<a
href="https://testnet.arcscan.app/address/0xA75ABf9725426F34b560E80B73Fa5403da3C967A"
target="_blank"
>

<button class="secondary">
View Contract
</button>

</a>

</div>

<script>

const CONTRACT_ADDRESS =
'0xA75ABf9725426F34b560E80B73Fa5403da3C967A';

const ABI = [

"function mint(string memory uri) public payable",

"function nextTokenId() view returns(uint256)",

"function balanceOf(address owner) view returns(uint256)",

"function minted(address owner) view returns(uint256)"

];

const METADATA_URI =
'https://gateway.pinata.cloud/ipfs/bafkreihgpyagb57cucqtgg6zfoakb4tfgbk7q7hnxggv4zafzk26gbe73e';

const MAX_SUPPLY = 100;

const ARC_CHAIN_ID_HEX =
'0x4cef52';

let provider;
let signer;

async function addArcNetwork(){

await window.ethereum.request({

method:'wallet_addEthereumChain',

params:[

{

chainId:'0x4cef52',

chainName:'Arc Testnet',

nativeCurrency:{

name:'USDC',

symbol:'USDC',

decimals:18

},

rpcUrls:[

'https://rpc.testnet.arc.network'

],

blockExplorerUrls:[

'https://testnet.arcscan.app'

]

}

]

});
}

async function switchToArc(){

try{

await window.ethereum.request({

method:'wallet_switchEthereumChain',

params:[

{
chainId:ARC_CHAIN_ID_HEX
}

]

});

}catch(err){

await addArcNetwork();
}
}

async function connectWallet(){

try{

if(!window.ethereum){

alert(
'Install MetaMask'
);

return;
}

await switchToArc();

await window.ethereum.request({

method:'eth_requestAccounts'
});

provider =
new ethers.BrowserProvider(
window.ethereum
);

signer =
await provider.getSigner();

const address =
await signer.getAddress();

document
.getElementById(
'address'
)
.innerText =

address;

document
.getElementById(
'networkStatus'
)
.innerText =

'✅ Connected to ARC Testnet';

await loadSupply();

await loadOwned();

}catch(err){

console.log(err);

alert(err.message);
}
}

async function loadSupply(){

try{

provider =
new ethers.BrowserProvider(
window.ethereum
);

const contract =
new ethers.Contract(

CONTRACT_ADDRESS,

ABI,

provider
);

const total =
await contract.nextTokenId();

document
.getElementById(
'supply'
)
.innerText =

`Supply: ${total}/${MAX_SUPPLY}`;

const percentage =
(Number(total)/MAX_SUPPLY)*100;

document
.getElementById(
'progressBar'
)
.style.width =

`${percentage}%`;

}catch(err){

console.log(err);
}
}

async function loadOwned(){

try{

if(!signer) return;

const contract =
new ethers.Contract(

CONTRACT_ADDRESS,

ABI,

provider
);

const address =
await signer.getAddress();

const balance =
await contract.balanceOf(
address
);

const minted =
await contract.minted(
address
);

document
.getElementById(
'owned'
)
.innerText =

`Your NFTs: ${balance} | Minted: ${minted}/3`;

}catch(err){

console.log(err);
}
}

async function mintNFT(){

try{

if(!signer){

alert(
'Connect wallet first'
);

return;
}

await switchToArc();

const contract =
new ethers.Contract(

CONTRACT_ADDRESS,

ABI,

signer
);

const mintButton =
document.getElementById(
'mint'
);

mintButton.disabled = true;

mintButton.innerText =
'Minting...';

const tx =
await contract.mint(

METADATA_URI,

{
value:
ethers.parseEther(
"0.001"
)
}

);

await tx.wait();

alert(
'Mint Success'
);

window.open(

`https://testnet.arcscan.app/tx/${tx.hash}`,

'_blank'
);

await loadSupply();

await loadOwned();

}catch(err){

console.log(err);

alert(
err.reason ||
err.shortMessage ||
err.message
);
}

document
.getElementById(
'mint'
)
.disabled = false;

document
.getElementById(
'mint'
)
.innerText =
'Mint NFT';
}

document
.getElementById(
'connect'
)
.onclick =
connectWallet;

document
.getElementById(
'mint'
)
.onclick =
mintNFT;

loadSupply();

</script>

</body>

</html>
