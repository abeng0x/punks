<script>

const CONTRACT =
"0x91e7abd694028dc4c9d9449e069c278780e9c83f";

const ABI = [
  "function mint(uint256 id) payable"
];

async function connectWallet(){

  try{

    if(!window.ethereum){
      alert("Install MetaMask");
      return;
    }

    const accounts =
      await window.ethereum.request({
        method:"eth_requestAccounts"
      });

    const address = accounts[0];

    document.getElementById(
      "connectBtn"
    ).innerText =
      address.slice(0,6) +
      "..." +
      address.slice(-4);

  }catch(err){

    console.log(err);

    alert("Wallet connection failed");

  }

}

async function mint(id){

  try{

    if(!window.ethereum){
      alert("Install MetaMask");
      return;
    }

    const provider =
      new ethers.providers.Web3Provider(
        window.ethereum
      );

    const signer =
      provider.getSigner();

    const contract =
      new ethers.Contract(
        CONTRACT,
        ABI,
        signer
      );

    const tx =
      await contract.mint(
        id,
        {
          value:
          ethers.utils.parseEther("20")
        }
      );

    alert("Mint submitted");

    await tx.wait();

    alert("Mint success");

  }catch(err){

    console.log(err);

    alert(
      "Mint failed: " +
      err.message
    );

  }

}
