<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>E A R N Genesis</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>

<style>

body {

  margin: 0;

  min-height: 100vh;

  display: flex;

  justify-content: center;

  align-items: center;

  background:
    radial-gradient(
      circle at top,
      #111827,
      #030303 70%
    );

  color: white;

  font-family: Arial;

  padding: 30px;
}

.card {

  width: 430px;

  background:
    rgba(255,255,255,0.05);

  border:
    1px solid rgba(255,255,255,0.08);

  border-radius: 28px;

  padding: 28px;

  backdrop-filter: blur(14px);

  box-shadow:
    0 0 50px rgba(0,255,170,0.08);
}

.hero {

  width: 100%;

  border-radius: 22px;

  margin-bottom: 20px;
}

h1 {

  font-size: 40px;

  margin-bottom: 8px;
}

.subtitle {

  color: #9ca3af;

  margin-bottom: 22px;
}

button {

  width: 100%;

  padding: 16px;

  margin-top: 14px;

  border: none;

  border-radius: 16px;

  font-size: 16px;

  cursor: pointer;

  font-weight: bold;

  transition: 0.2s;
}

button:hover {

  transform: translateY(-2px);
}

.primary {

  background:
    linear-gradient(
      135deg,
      #00ffa3,
      #00c2ff
    );

  color: black;
}

.secondary {

  background: #1f2937;

  color: white;
}

.stats {

  background:
    rgba(255,255,255,0.04);

  border-radius: 18px;

  padding: 18px;

  margin-top: 18px;
}

.stats p {

  margin: 10px 0;

  color: white;
}

.progress-container {

  width: 100%;

  height: 14px;

  background: #1f2937;

  border-radius: 999px;

  overflow: hidden;

  margin-top: 10px;
}

.progress-bar {

  width: 0%;

  height: 100%;

  background:
    linear-gradient(
      90deg,
      #00ffa3,
      #00c2ff
    );

  transition: 0.4s;
}

#networkStatus {

  margin-top: 12px;

  font-weight: bold;
}

#address {

  color: #00ffa3;

  margin-top: 12px;

  font-size: 14px;
}

a {

  text-decoration: none;
}

</style>

</head>

<body>

<div class="card">

  <img
    class="hero"
    src="https://i.imgur.com/Eu4epbQ.jpeg"
  />

  <h1>E A R N Genesis</h1>

  <p class="subtitle">
    ARC Testnet NFT Collection
  </p>

  <div class="stats">

    <p id="price">
      Mint Price: FREE
    </p>

    <p id="supply">
      Supply: Loading...
    </p>

    <div class="progress-container">

      <div
        id="progressBar"
        class="progress-bar"
      ></div>

    </div>

    <p>
      Max Per Wallet: 3
    </p>

    <p id="owned">
      Your NFTs: 0
    </p>

  </div>

  <button
    id="connect"
    class="primary"
  >

    Connect Wallet

  </button>

  <p id="address">
    Not Connected
  </p>

  <p id="networkStatus">
    Network: Not Connected
  </p>

  <button
    id="mint"
    class="primary"
  >

    Mint NFT

  </button>

  <a
    href="https://testnet.arcscan.app/address/0xA75ABf9725426F34b560E80B73Fa5403da3C967A"
    target="_blank"
  >

    <button class="secondary">
      View Contract
    </button>

  </a>

  <a
    href="https://testnet.arcscan.app"
    target="_blank"
  >

    <button class="secondary">
      ARC Explorer
    </button>

  </a>

</div>

<script>

const CONTRACT_ADDRESS =
  '0xA75ABf9725426F34b560E80B73Fa5403da3C967A';

const ABI = [

  "function mint(string memory uri) public",

  "function nextTokenId() view returns (uint256)",

  "function balanceOf(address owner) view returns (uint256)"
];

const METADATA_URI =
  'https://gateway.pinata.cloud/ipfs/bafkreihgpyagb57cucqtgg6zfoakb4tfgbk7q7hnxggv4zafzk26gbe73e';

const MAX_SUPPLY = 100;

const ARC_CHAIN_ID_DECIMAL = 5042002;

const ARC_CHAIN_ID_HEX =
  '0x' + ARC_CHAIN_ID_DECIMAL.toString(16);

let signer;

async function loadSupply() {

  try {

    if (!window.ethereum) return;

    const provider =
      new ethers.BrowserProvider(
        window.ethereum
      );

    const contract =
      new ethers.Contract(

        CONTRACT_ADDRESS,

        ABI,

        provider
      );

    const total =
      await contract.nextTokenId();

    document
      .getElementById(
        'supply'
      )
      .innerText =

      `Supply: ${total}/${MAX_SUPPLY}`;

    const percentage =

      (Number(total) / MAX_SUPPLY) * 100;

    document
      .getElementById(
        'progressBar'
      )
      .style.width =

      `${percentage}%`;

  } catch(err) {

    console.log(err);
  }
}

async function loadOwnedNFTs() {

  if (!signer) return;

  try {

    const provider =
      new ethers.BrowserProvider(
        window.ethereum
      );

    const contract =
      new ethers.Contract(

        CONTRACT_ADDRESS,

        ABI,

        provider
      );

    const address =
      await signer.getAddress();

    const balance =
      await contract.balanceOf(
        address
      );

    document
      .getElementById(
        'owned'
      )
      .innerText =

      `Your NFTs: ${balance}`;

  } catch(err) {

    console.log(err);
  }
}

async function switchToArcNetwork() {

  if (!window.ethereum) return;

  try {

    await window.ethereum.request({

      method: 'wallet_switchEthereumChain',

      params: [

        {
          chainId: ARC_CHAIN_ID_HEX
        }
      ]
    });

  } catch (switchError) {

    try {

      await window.ethereum.request({

        method: 'wallet_addEthereumChain',

        params: [

          {
            chainId: ARC_CHAIN_ID_HEX,

            chainName: 'Arc Testnet',

            nativeCurrency: {

              name: 'USDC',

              symbol: 'USDC',

              decimals: 18
            },

            rpcUrls: [

              'https://rpc.testnet.arc.network'
            ],

            blockExplorerUrls: [

              'https://testnet.arcscan.app'
            ]
          }
        ]
      });

    } catch(addError) {

      console.log(addError);
    }
  }
}

async function checkNetwork() {

  if (!window.ethereum) return;

  const chainId =
    await window.ethereum.request({

      method: 'eth_chainId'
    });

  if (

    chainId.toLowerCase()

    ===

    ARC_CHAIN_ID_HEX.toLowerCase()

  ) {

    document
      .getElementById(
        'networkStatus'
      )
      .innerText =

      '✅ Connected to ARC Testnet';

  } else {

    document
      .getElementById(
        'networkStatus'
      )
      .innerText =

      '❌ Wrong Network';
  }
}

async function connectWallet() {

  if (!window.ethereum) {

    alert(
      'Install MetaMask'
    );

    return;
  }

  await switchToArcNetwork();

  await window.ethereum.request({

    method: 'eth_requestAccounts'
  });

  await switchToArcNetwork();

  const provider =
    new ethers.BrowserProvider(
      window.ethereum
    );

  signer =
    await provider.getSigner();

  const address =
    await signer.getAddress();

  document
    .getElementById(
      'address'
    )
    .innerText =

    `Connected:
${address.slice(0,6)}...${address.slice(-4)}`;

  await checkNetwork();

  await loadSupply();

  await loadOwnedNFTs();
}

async function mintNFT() {

  if (!signer) {

    alert(
      'Connect wallet first'
    );

    return;
  }

  await switchToArcNetwork();

  const currentChain =
    await window.ethereum.request({

      method: 'eth_chainId'
    });

  if (

    currentChain.toLowerCase()

    !==

    ARC_CHAIN_ID_HEX.toLowerCase()

  ) {

    alert(
      'Please switch to ARC Testnet'
    );

    return;
  }

  const mintButton =
    document.getElementById(
      'mint'
    );

  try {

    mintButton.disabled = true;

    mintButton.innerText =
      'Minting...';

    const contract =
      new ethers.Contract(

        CONTRACT_ADDRESS,

        ABI,

        signer
      );

    const tx =
      await contract.mint(
        METADATA_URI
      );

    await tx.wait();

    mintButton.innerText =
      'Mint Success';

    window.open(

      `https://testnet.arcscan.app/tx/${tx.hash}`,

      '_blank'
    );

    await loadSupply();

    await loadOwnedNFTs();

  } catch(err) {

    console.log(err);

    alert(
      err.message
    );
  }

  mintButton.disabled = false;

  mintButton.innerText =
    'Mint NFT';
}

document
  .getElementById('connect')
  .onclick =
    connectWallet;

document
  .getElementById('mint')
  .onclick =
    mintNFT;

loadSupply();

</script>

</body>
</html>
