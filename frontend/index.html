<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Punks NFT</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<style>
/* Styles sama seperti versi sebelumnya */
body{background:#050505;color:white;font-family:Arial, Helvetica, sans-serif;overflow-x:hidden;}
header{display:flex;justify-content:space-between;align-items:center;padding:18px 30px;background:rgba(0,0,0,0.7);position:sticky;top:0;}
.wallet-btn{padding:12px 18px;border:none;border-radius:12px;background:white;color:black;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;padding:20px;max-width:1600px;margin:auto;}
.card{background:rgba(255,255,255,0.05);border-radius:18px;overflow:hidden;padding:14px;text-align:center;}
.nft-img{width:100%;height:170px;object-fit:cover;}
.mint-btn{width:100%;padding:10px;border:none;border-radius:10px;background:white;color:black;cursor:pointer;}
.explorer-btn{width:100%;display:flex;justify-content:center;padding:10px;border-radius:10px;background:rgba(255,255,255,0.08);color:white;text-decoration:none;font-size:12px;}
</style>
</head>
<body>

<header>
<div class="logo">PUNKS <span>ON ARC TESTNET</span></div>
<button id="connectBtn" class="wallet-btn" onclick="connectWallet()">CONNECT WALLET</button>
</header>

<section class="grid">

<div class="card">
<img src="./img/kuci.jpg" class="nft-img">
<div class="nft-name">KUCI</div>
<div class="mint-btn" onclick="mint(1)">MINT</div>
<a href="https://testnet.arcscan.app/address/0x91e7abd694028dc4c9d9449e069c278780e9c83f" class="explorer-btn" target="_blank">EXPLORER</a>
</div>

<div class="card">
<img src="./img/beru.jpg" class="nft-img">
<div class="nft-name">BERU</div>
<div class="mint-btn" onclick="mint(2)">MINT</div>
<a href="https://testnet.arcscan.app/address/0x91e7abd694028dc4c9d9449e069c278780e9c83f" class="explorer-btn" target="_blank">EXPLORER</a>
</div>

<div class="card">
<img src="./img/anji.jpg" class="nft-img">
<div class="nft-name">ANJI</div>
<div class="mint-btn" onclick="mint(3)">MINT</div>
<a href="https://testnet.arcscan.app/address/0x91e7abd694028dc4c9d9449e069c278780e9c83f" class="explorer-btn" target="_blank">EXPLORER</a>
</div>

<div class="card">
<img src="./img/ora.jpg" class="nft-img">
<div class="nft-name">ORA</div>
<div class="mint-btn" onclick="mint(4)">MINT</div>
<a href="https://testnet.arcscan.app/address/0x91e7abd694028dc4c9d9449e069c278780e9c83f" class="explorer-btn" target="_blank">EXPLORER</a>
</div>

<div class="card">
<img src="./img/pisa.jpg" class="nft-img">
<div class="nft-name">PISA</div>
<div class="mint-btn" onclick="mint(5)">MINT</div>
<a href="https://testnet.arcscan.app/address/0x91e7abd694028dc4c9d9449e069c278780e9c83f" class="explorer-btn" target="_blank">EXPLORER</a>
</div>

<div class="card">
<img src="./img/sing.jpg" class="nft-img">
<div class="nft-name">SING</div>
<div class="mint-btn" onclick="mint(6)">MINT</div>
<a href="https://testnet.arcscan.app/address/0x91e7abd694028dc4c9d9449e069c278780e9c83f" class="explorer-btn" target="_blank">EXPLORER</a>
</div>

</section>

<script>
const CONTRACT = "0x0772aff86fafe4baed247f2da9f04d3cb688821c";
const ABI = ["function mint(uint256 id) payable"];

async function connectWallet(){
  try{
    if(!window.ethereum){ alert("Install MetaMask"); return; }
    const accounts = await window.ethereum.request({ method:"eth_requestAccounts" });
    const address = accounts[0];
    document.getElementById("connectBtn").innerText = address.slice(0,6)+"..."+address.slice(-4);
  }catch(err){ console.log(err); alert("Wallet connection failed"); }
}

async function mint(id){
  try{
    if(!window.ethereum){ alert("Install MetaMask"); return; }
    const provider = new ethers.providers.Web3Provider(window.ethereum);
    const signer = provider.getSigner();
    const contract = new ethers.Contract(CONTRACT, ABI, signer);
    const tx = await contract.mint(id,{ value: ethers.utils.parseEther("20") });
    alert("Mint submitted");
    await tx.wait();
    alert("Mint success");
  }catch(err){ console.log(err); alert("Mint failed: "+err.message); }
}
</script>

</body>
</html>
