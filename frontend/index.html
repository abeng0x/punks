header{

  border-bottom:1px solid rgba(255,255,255,0.08);
  background:rgba(0,0,0,0.7);

  font-weight:800;
  cursor:pointer;
  transition:.2s;
}

.wallet-btn:hover{

.hero{

.grid{

  max-width:1600px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:16px;
  padding:20px;

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  overflow:hidden;
  transition:.25s;
  backdrop-filter:blur(10px);
}

.card:hover{
  transform:translateY(-5px);
  border-color:rgba(255,255,255,0.18);
}

.nft-img{
  width:100%;
  height:170px;
  object-fit:cover;
}

.content{
  padding:14px;
}

.nft-name{
  font-size:18px;
  font-weight:900;

}

.meta{

.mint-btn{

  border-radius:10px;
  background:white;
  color:black;
  font-weight:900;
  cursor:pointer;
  margin-bottom:10px;
  transition:.2s;
}

.mint-btn:hover{

.explorer-btn{

footer{

.social{

@media(max-width:1400px){

<script>

const CONTRACT =
"0x286fa0922e3dda55c361933fac736f987244f7dd";

const ABI = [
  "function mint(uint256 id) payable"
];

let signer;

async function connectWallet(){

  try{

    if(typeof window.ethereum === "undefined"){
      alert("Please install MetaMask");
      return;
    }

    await window.ethereum.request({
      method:"eth_requestAccounts"
    });

    const provider =
    new ethers.providers.Web3Provider(
      window.ethereum
    );

    signer = provider.getSigner();

    const address =
    await signer.getAddress();

    document.getElementById(
      "connectBtn"
    ).innerText =
    address.slice(0,6) +
    "..." +
    address.slice(-4);

  }catch(err){

    console.log(err);

    alert("Wallet connection failed");

  }

}

async function mint(id){

  try{

    if(!signer){
      alert("Connect wallet first");
      return;
    }

    const contract =
    new ethers.Contract(
      CONTRACT,
      ABI,
      signer
    );

    const tx =
    await contract.mint(
      id,
      {
        value:
        ethers.utils.parseEther("20")
      }
    );

    alert("Mint submitted");

    await tx.wait();

    alert("Mint success");

  }catch(err){

    console.log(err);

    alert("Mint failed");

  }

}
