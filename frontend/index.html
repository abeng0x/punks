<script>

  const CONTRACT =
    "0xaa7f7ebf7324e8842d29beafdbd1cc09191e0a1c";

  const ABI = [
    "function mint(uint256 id) payable external"
  ];

  async function connectWallet(){

    try{

      if(!window.ethereum){

        alert(
          "Please install MetaMask or OKX Wallet"
        );

        return;
      }

      const accounts =
        await window.ethereum.request({
          method:"eth_requestAccounts"
        });

      const wallet =
        accounts[0];

      const short =
        wallet.slice(0,6)
        + "..."
        + wallet.slice(-4);

      const connectButton =
        document.getElementById(
          "connectButton"
        );

      connectButton.innerText =
        short;

      document.getElementById(
        "disconnectButton"
      ).style.display = "block";

    }catch(err){

      console.log(err);

      alert(
        "Wallet connection failed"
      );
    }
  }

  function disconnectWallet(){

    document.getElementById(
      "connectButton"
    ).innerText =
      "Connect Wallet";

    document.getElementById(
      "disconnectButton"
    ).style.display =
      "none";
  }

  async function mint(id){

    try{

      if(!window.ethereum){

        alert(
          "Wallet not detected"
        );

        return;
      }

      const provider =
        new ethers.BrowserProvider(
          window.ethereum
        );

      const signer =
        await provider.getSigner();

      const contract =
        new ethers.Contract(
          CONTRACT,
          ABI,
          signer
        );

      const button =
        event.target;

      const originalText =
        button.innerText;

      button.innerText =
        "Minting...";

      button.disabled = true;

      const tx =
        await contract.mint(
          id,
          {
            value:
              ethers.parseEther("20")
          }
        );

      alert(
        "Transaction submitted"
      );

      await tx.wait();

      button.innerText =
        "Minted";

      alert(
        `Successfully minted Punk #${id}`
      );

    }catch(err){

      console.log(err);

      alert(
        "Mint failed"
      );

      event.target.innerText =
        "Mint Now";

      event.target.disabled =
        false;
    }
  }

</script>
